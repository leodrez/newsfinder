polling_interval_seconds: 30

llm:
  model: claude-haiku-4-5-20251001
  # Max batch size: when say 12 new headlines arrive in a polling cycle, they get split into 3 batches (5 + 5 + 2) and each batch is scored in a separate API call.
  max_batch_size: 5
  # default_market_focus: "US equities, S&P 500, major tech stocks"
  default_market_focus: "S&P 500 (SPY, ES) and Nasdaq 100 (QQQ, NQ) index futures and ETFs. Interested in: Fed rate decisions, CPI/PPI/jobs data, big tech earnings (AAPL, MSFT, NVDA, GOOGL, AMZN, META, TSLA), geopolitical shocks, oil/energy disruptions, Treasury yields, and sector rotation signals."  

